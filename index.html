<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIS Quiz — Prof. Dachyar · UI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: rgba(255,255,255,0.07);
    --accent: #6c63ff;
    --accent2: #ff6b6b;
    --accent3: #43e97b;
    --gold: #ffd166;
    --text: #f0f0f8;
    --muted: #6b6b85;
    --correct: #43e97b;
    --wrong: #ff6b6b;
    --radius: 16px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG grid */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(108,99,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,99,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.15;
    pointer-events: none;
    z-index: 0;
  }
  .blob-1 { width: 600px; height: 600px; background: var(--accent); top: -200px; right: -200px; }
  .blob-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; left: -100px; }

  /* ===================== SCREENS ===================== */
  .screen {
    position: relative; z-index: 1;
    display: none;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .screen.active { display: flex; }

  /* ===================== SPLASH ===================== */
  #splash {
    flex-direction: column;
    text-align: center;
  }
  .splash-badge {
    display: inline-block;
    background: rgba(108,99,255,0.15);
    border: 1px solid rgba(108,99,255,0.3);
    color: #a89dff;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 100px;
    margin-bottom: 32px;
    font-family: 'Syne', sans-serif;
  }
  .splash-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(42px, 8vw, 88px);
    line-height: 1;
    letter-spacing: -3px;
    margin-bottom: 8px;
  }
  .splash-title span { color: var(--accent); }
  .splash-sub {
    font-size: clamp(16px, 2.5vw, 20px);
    color: var(--muted);
    font-weight: 300;
    margin-bottom: 48px;
    max-width: 500px;
    margin-inline: auto;
  }
  .splash-meta {
    display: flex;
    gap: 32px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 56px;
  }
  .meta-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .meta-val {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    color: var(--gold);
  }
  .meta-label {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .meta-sep { width: 1px; background: var(--border); align-self: stretch; }

  .btn-start {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 100px;
    padding: 18px 40px;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 40px rgba(108,99,255,0.4);
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 0 60px rgba(108,99,255,0.6); }
  .btn-start:active { transform: translateY(0); }
  .btn-arrow { font-size: 20px; transition: transform 0.2s; }
  .btn-start:hover .btn-arrow { transform: translateX(4px); }

  .splash-author {
    margin-top: 48px;
    font-size: 13px;
    color: var(--muted);
  }
  .splash-author strong { color: rgba(240,240,248,0.6); }

  /* ===================== QUIZ ===================== */
  #quiz {
    flex-direction: column;
    padding: 0;
    align-items: stretch;
    justify-content: flex-start;
  }

  /* Top bar */
  .quiz-topbar {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .quiz-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.5px;
    flex-shrink: 0;
  }
  .quiz-logo span { color: var(--accent); }

  .progress-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .progress-track {
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 100px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #a89dff);
    border-radius: 100px;
    transition: width 0.4s cubic-bezier(.4,0,.2,1);
  }
  .progress-label {
    font-size: 12px;
    color: var(--muted);
    text-align: right;
  }
  .progress-label span { color: var(--text); font-weight: 500; }

  /* Timer */
  .timer {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 8px 16px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    flex-shrink: 0;
    transition: color 0.3s, border-color 0.3s;
  }
  .timer.warn { color: var(--gold); border-color: rgba(255,209,102,0.3); }
  .timer.danger { color: var(--wrong); border-color: rgba(255,107,107,0.4); animation: pulse-timer 1s infinite; }
  @keyframes pulse-timer { 0%,100%{opacity:1} 50%{opacity:0.6} }
  .timer-icon { font-size: 14px; }

  /* Score badge */
  .score-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(67,233,123,0.1);
    border: 1px solid rgba(67,233,123,0.2);
    border-radius: 100px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--correct);
    flex-shrink: 0;
  }

  /* Question area */
  .quiz-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 780px;
    width: 100%;
    margin: 0 auto;
    padding: 40px 24px 100px;
    gap: 28px;
  }

  .q-number {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .q-number span { color: var(--accent); }

  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    position: relative;
    overflow: hidden;
  }
  .q-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), #a89dff);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .q-card.answered::before { opacity: 1; }

  .q-text {
    font-size: clamp(15px, 2.2vw, 18px);
    font-weight: 400;
    line-height: 1.7;
    color: var(--text);
  }

  /* Options */
  .options-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(.4,0,.2,1);
    position: relative;
    overflow: hidden;
  }
  .option::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(108,99,255,0.06);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .option:hover:not(.disabled)::before { opacity: 1; }
  .option:hover:not(.disabled) { border-color: rgba(108,99,255,0.4); transform: translateX(4px); }
  .option:active:not(.disabled) { transform: translateX(2px) scale(0.99); }

  .option.selected { border-color: var(--accent); background: rgba(108,99,255,0.1); }
  .option.correct { border-color: var(--correct); background: rgba(67,233,123,0.1); animation: pop 0.3s; }
  .option.wrong { border-color: var(--wrong); background: rgba(255,107,107,0.1); animation: shake 0.4s; }
  .option.show-correct { border-color: var(--correct); background: rgba(67,233,123,0.06); }
  .option.disabled { cursor: default; }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.02); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  .opt-letter {
    width: 32px;
    height: 32px;
    min-width: 32px;
    border-radius: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--muted);
    transition: all 0.2s;
    margin-top: 1px;
  }
  .option.selected .opt-letter { background: var(--accent); border-color: var(--accent); color: white; }
  .option.correct .opt-letter { background: var(--correct); border-color: var(--correct); color: #0a0a0f; }
  .option.wrong .opt-letter { background: var(--wrong); border-color: var(--wrong); color: white; }
  .option.show-correct .opt-letter { background: rgba(67,233,123,0.2); border-color: var(--correct); color: var(--correct); }

  .opt-text {
    font-size: 15px;
    line-height: 1.6;
    color: var(--text);
    flex: 1;
  }

  .opt-icon {
    font-size: 18px;
    margin-left: auto;
    opacity: 0;
    transition: opacity 0.2s;
    flex-shrink: 0;
    margin-top: 6px;
  }
  .option.correct .opt-icon, .option.wrong .opt-icon, .option.show-correct .opt-icon { opacity: 1; }

  /* Feedback banner */
  .feedback {
    border-radius: var(--radius);
    padding: 16px 20px;
    font-size: 14px;
    font-weight: 500;
    display: none;
    align-items: center;
    gap: 12px;
    animation: slideUp 0.3s cubic-bezier(.4,0,.2,1);
  }
  .feedback.show { display: flex; }
  .feedback.correct-fb { background: rgba(67,233,123,0.12); border: 1px solid rgba(67,233,123,0.25); color: var(--correct); }
  .feedback.wrong-fb { background: rgba(255,107,107,0.12); border: 1px solid rgba(255,107,107,0.25); color: var(--wrong); }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Bottom nav */
  .quiz-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .nav-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 24px;
    border-radius: 100px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav-btn:hover:not(:disabled) { border-color: rgba(255,255,255,0.2); color: var(--text); background: var(--surface); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .nav-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    font-weight: 600;
    box-shadow: 0 0 20px rgba(108,99,255,0.3);
  }
  .nav-btn.primary:hover { box-shadow: 0 0 30px rgba(108,99,255,0.5); transform: translateY(-1px); }

  .nav-dots {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 300px;
  }
  .nav-dot {
    width: 8px; height: 8px;
    border-radius: 2px;
    background: var(--border);
    transition: all 0.2s;
    cursor: pointer;
  }
  .nav-dot.answered { background: var(--accent); opacity: 0.5; }
  .nav-dot.correct { background: var(--correct); opacity: 0.7; }
  .nav-dot.wrong { background: var(--wrong); opacity: 0.7; }
  .nav-dot.current { background: var(--accent); transform: scale(1.5); opacity: 1; }

  /* ===================== RESULT ===================== */
  #result {
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 40px 24px;
  }

  .result-ring {
    position: relative;
    width: 200px; height: 200px;
    margin-bottom: 32px;
  }
  .result-ring svg { width: 200px; height: 200px; transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--surface2); stroke-width: 8; }
  .ring-fill { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1.5s cubic-bezier(.4,0,.2,1); }
  .result-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 2px;
  }
  .result-pct {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 44px;
    line-height: 1;
  }
  .result-pct-label { font-size: 13px; color: var(--muted); }

  .result-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(28px, 5vw, 48px);
    letter-spacing: -1.5px;
    margin-bottom: 12px;
  }
  .result-msg { color: var(--muted); font-size: 16px; margin-bottom: 40px; max-width: 400px; }

  .result-stats {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 48px;
  }
  .stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 28px;
    display: flex; flex-direction: column;
    align-items: center; gap: 4px;
    min-width: 100px;
  }
  .stat-val {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 28px;
  }
  .stat-val.green { color: var(--correct); }
  .stat-val.red { color: var(--wrong); }
  .stat-val.blue { color: var(--accent); }
  .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  .result-actions {
    display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
  }
  .btn-retry {
    display: flex; align-items: center; gap: 8px;
    background: var(--accent); color: white;
    border: none; border-radius: 100px;
    padding: 14px 32px;
    font-family: 'Syne', sans-serif; font-weight: 700;
    font-size: 15px; cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 30px rgba(108,99,255,0.35);
  }
  .btn-retry:hover { transform: translateY(-2px); box-shadow: 0 0 50px rgba(108,99,255,0.5); }

  .btn-review {
    display: flex; align-items: center; gap: 8px;
    background: transparent; color: var(--text);
    border: 1.5px solid var(--border); border-radius: 100px;
    padding: 14px 32px;
    font-family: 'DM Sans', sans-serif; font-weight: 500;
    font-size: 15px; cursor: pointer;
    transition: all 0.2s;
  }
  .btn-review:hover { border-color: rgba(255,255,255,0.2); background: var(--surface); }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 8px; height: 8px;
    border-radius: 2px;
    animation: confetti-fall linear forwards;
    pointer-events: none;
    z-index: 100;
  }
  @keyframes confetti-fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* Entrance animation */
  .fade-in {
    animation: fadeIn 0.4s cubic-bezier(.4,0,.2,1) both;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Responsive */
  @media (max-width: 600px) {
    .quiz-topbar { padding: 12px 16px; gap: 10px; }
    .quiz-logo { display: none; }
    .q-card { padding: 20px; }
    .option { padding: 14px 16px; }
    .timer { padding: 6px 12px; font-size: 13px; }
    .score-badge { display: none; }
    .nav-dots { max-width: 200px; }
  }
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<!-- SPLASH -->
<div class="screen active" id="splash">
  <div class="fade-in">
    <div class="splash-badge">Universitas Indonesia · Teknik Industri</div>
    <h1 class="splash-title">MIS<br><span>Quiz</span></h1>
    <p class="splash-sub">Management Information Systems — Prof. Dr. Ir. M Dachyar, MSc.</p>
    <div class="splash-meta">
      <div class="meta-item">
        <div class="meta-val">140</div>
        <div class="meta-label">Questions</div>
      </div>
      <div class="meta-sep"></div>
      <div class="meta-item">
        <div class="meta-val">12</div>
        <div class="meta-label">Minutes</div>
      </div>
      <div class="meta-sep"></div>
      <div class="meta-item">
        <div class="meta-val">80%</div>
        <div class="meta-label">To Pass</div>
      </div>
    </div>
    <button class="btn-start" onclick="startQuiz()">
      Start Quiz <span class="btn-arrow">→</span>
    </button>
    <p class="splash-author">Oct 18, 2023 · <strong>Siang Session</strong></p>
  </div>
</div>

<!-- QUIZ -->
<div class="screen" id="quiz">
  <!-- Topbar -->
  <div class="quiz-topbar">
    <div class="quiz-logo">MIS<span>.</span></div>
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-label"><span id="progressText">1</span> / 140</div>
    </div>
    <div class="timer" id="timer">
      <span class="timer-icon">⏱</span>
      <span id="timerText">12:00</span>
    </div>
    <div class="score-badge">
      <span>✓</span>
      <span id="scoreText">0</span>
    </div>
  </div>

  <!-- Body -->
  <div class="quiz-body" id="quizBody">
    <!-- Injected by JS -->
  </div>

  <!-- Bottom nav -->
  <div class="quiz-nav">
    <button class="nav-btn" id="btnPrev" onclick="navigate(-1)" disabled>← Prev</button>
    <div class="nav-dots" id="navDots"></div>
    <button class="nav-btn primary" id="btnNext" onclick="navigate(1)">Next →</button>
  </div>
</div>

<!-- RESULT -->
<div class="screen" id="result">
  <div class="fade-in" style="width:100%;max-width:600px;">
    <div class="result-ring" id="resultRing">
      <svg viewBox="0 0 200 200">
        <circle class="ring-bg" cx="100" cy="100" r="88"/>
        <circle class="ring-fill" id="ringFill" cx="100" cy="100" r="88" stroke="#6c63ff"
          stroke-dasharray="553" stroke-dashoffset="553"/>
      </svg>
      <div class="result-center">
        <div class="result-pct" id="resultPct">0%</div>
        <div class="result-pct-label">Score</div>
      </div>
    </div>
    <h2 class="result-title" id="resultTitle">Quiz Complete!</h2>
    <p class="result-msg" id="resultMsg">Here's how you did.</p>
    <div class="result-stats">
      <div class="stat-box">
        <div class="stat-val green" id="statCorrect">0</div>
        <div class="stat-label">Correct</div>
      </div>
      <div class="stat-box">
        <div class="stat-val red" id="statWrong">0</div>
        <div class="stat-label">Wrong</div>
      </div>
      <div class="stat-box">
        <div class="stat-val blue" id="statSkipped">0</div>
        <div class="stat-label">Skipped</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="statTime">0:00</div>
        <div class="stat-label">Time</div>
      </div>
    </div>
    <div class="result-actions">
      <button class="btn-retry" onclick="retryQuiz()">↺ Retry Quiz</button>
      <button class="btn-review" onclick="reviewQuiz()">📋 Review Answers</button>
    </div>
  </div>
</div>

<script>

const TOTAL_TIME = 720; // 12 min in seconds

let currentQ = 0;
let userAnswers = new Array(QUESTIONS.length).fill(null);
let startTime, timerInterval;
let timeLeft = TOTAL_TIME;
let quizStarted = false;
let reviewMode = false;

const letters = ['A','B','C','D','E','F'];

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz() {
  reviewMode = false;
  currentQ = 0;
  userAnswers = new Array(QUESTIONS.length).fill(null);
  timeLeft = TOTAL_TIME;
  quizStarted = true;
  showScreen('quiz');
  renderQuestion();
  buildDots();
  startTimer();
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimer();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      finishQuiz();
    }
  }, 1000);
}

function updateTimer() {
  const m = Math.floor(timeLeft / 60);
  const s = timeLeft % 60;
  document.getElementById('timerText').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  const el = document.getElementById('timer');
  el.classList.remove('warn','danger');
  if (timeLeft <= 60) el.classList.add('danger');
  else if (timeLeft <= 180) el.classList.add('warn');
}

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  const answered = userAnswers[currentQ];
  
  // Progress
  const pct = ((currentQ + 1) / QUESTIONS.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = currentQ + 1;
  
  // Score
  const correct = userAnswers.filter((a, i) => a !== null && a === QUESTIONS[i].correct).length;
  document.getElementById('scoreText').textContent = correct;
  
  // Nav buttons
  document.getElementById('btnPrev').disabled = currentQ === 0;
  const isLast = currentQ === QUESTIONS.length - 1;
  const nextBtn = document.getElementById('btnNext');
  nextBtn.textContent = isLast ? 'Finish 🏁' : 'Next →';
  nextBtn.onclick = isLast ? finishQuiz : () => navigate(1);

  // Build question card
  const body = document.getElementById('quizBody');
  let optionsHTML = q.options.map((opt, i) => {
    let cls = 'option';
    let icon = '';
    let letterStyle = '';
    if (answered !== null) {
      cls += ' disabled';
      if (i === q.correct) { cls += ' show-correct'; icon = '✓'; }
      if (i === answered && answered !== q.correct) { cls += ' wrong'; icon = '✗'; }
      if (i === answered && answered === q.correct) { cls = 'option disabled correct'; icon = '✓'; }
    }
    return `<div class="${cls}" onclick="selectAnswer(${i})">
      <div class="opt-letter">${letters[i]}</div>
      <div class="opt-text">${opt}</div>
      <div class="opt-icon">${icon}</div>
    </div>`;
  }).join('');

  let feedbackHTML = '';
  if (answered !== null) {
    const isCorrect = answered === q.correct;
    const fbCls = isCorrect ? 'correct-fb' : 'wrong-fb';
    const msg = isCorrect
      ? '🎉 Correct! Well done.'
      : `❌ Incorrect. The correct answer was <strong>${letters[q.correct]}</strong>.`;
    feedbackHTML = `<div class="feedback ${fbCls} show">${msg}</div>`;
  }

  body.innerHTML = `
    <div class="q-number fade-in">Question <span>${currentQ + 1}</span> of ${QUESTIONS.length}</div>
    <div class="q-card ${answered !== null ? 'answered' : ''} fade-in" style="animation-delay:0.05s">
      <div class="q-text">${q.question}</div>
    </div>
    <div class="options-grid fade-in" style="animation-delay:0.1s">${optionsHTML}</div>
    ${feedbackHTML}
  `;
  
  updateDots();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectAnswer(idx) {
  if (userAnswers[currentQ] !== null) return;
  userAnswers[currentQ] = idx;
  renderQuestion();
}

function navigate(dir) {
  const next = currentQ + dir;
  if (next < 0 || next >= QUESTIONS.length) return;
  currentQ = next;
  renderQuestion();
}

function buildDots() {
  const container = document.getElementById('navDots');
  container.innerHTML = QUESTIONS.map((_, i) =>
    `<div class="nav-dot" id="dot-${i}" onclick="jumpTo(${i})"></div>`
  ).join('');
}

function updateDots() {
  QUESTIONS.forEach((q, i) => {
    const dot = document.getElementById('dot-' + i);
    if (!dot) return;
    dot.className = 'nav-dot';
    if (i === currentQ) { dot.classList.add('current'); return; }
    if (userAnswers[i] !== null) {
      dot.classList.add(userAnswers[i] === q.correct ? 'correct' : 'wrong');
    }
  });
}

function jumpTo(i) {
  currentQ = i;
  renderQuestion();
}

function finishQuiz() {
  clearInterval(timerInterval);
  const timeTaken = TOTAL_TIME - timeLeft;
  
  let correct = 0, skipped = 0, wrong = 0;
  userAnswers.forEach((a, i) => {
    if (a === null) skipped++;
    else if (a === QUESTIONS[i].correct) correct++;
    else wrong++;
  });
  
  const pct = Math.round((correct / QUESTIONS.length) * 100);
  const passed = pct >= 80;
  
  // Ring animation
  const circumference = 553;
  const offset = circumference - (pct / 100) * circumference;
  setTimeout(() => {
    const fill = document.getElementById('ringFill');
    fill.style.stroke = passed ? '#43e97b' : pct >= 60 ? '#ffd166' : '#ff6b6b';
    fill.style.strokeDashoffset = offset;
  }, 200);
  
  // Counter animation
  animateNumber('resultPct', 0, pct, 1200, '%');
  animateNumber('statCorrect', 0, correct, 1000);
  animateNumber('statWrong', 0, wrong, 1000);
  animateNumber('statSkipped', 0, skipped, 1000);
  
  const m = Math.floor(timeTaken / 60);
  const s = timeTaken % 60;
  document.getElementById('statTime').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  
  if (passed) {
    document.getElementById('resultTitle').textContent = 'Congratulations! 🎉';
    document.getElementById('resultMsg').textContent = `You passed with ${pct}%. Excellent work on the MIS quiz!`;
    launchConfetti();
  } else {
    document.getElementById('resultTitle').textContent = 'Keep Practicing!';
    document.getElementById('resultMsg').textContent = `You scored ${pct}%. You need 80% to pass. Try again!`;
  }
  
  showScreen('result');
}

function animateNumber(id, from, to, duration, suffix = '') {
  const el = document.getElementById(id);
  const start = performance.now();
  function update(now) {
    const t = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    el.textContent = Math.round(from + (to - from) * ease) + suffix;
    if (t < 1) requestAnimationFrame(update);
  }
  requestAnimationFrame(update);
}

function launchConfetti() {
  const colors = ['#6c63ff','#ff6b6b','#43e97b','#ffd166','#a89dff','#ff9ff3'];
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `
        left: ${Math.random() * 100}vw;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        animation-duration: ${1.5 + Math.random() * 2}s;
        animation-delay: ${Math.random() * 0.5}s;
        width: ${6 + Math.random() * 8}px;
        height: ${6 + Math.random() * 8}px;
        border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }, Math.random() * 600);
  }
}

function retryQuiz() {
  startQuiz();
}

function reviewQuiz() {
  reviewMode = true;
  currentQ = 0;
  showScreen('quiz');
  clearInterval(timerInterval);
  document.getElementById('timer').style.display = 'none';
  document.getElementById('progressText').textContent = currentQ + 1;
  buildDots();
  renderQuestion();
  updateDots();
  // Make all dots visible
  QUESTIONS.forEach((q, i) => {
    if (userAnswers[i] === null) userAnswers[i]; // keep null
  });
}
</script>
